{% extends "base.html" %}
{% block title %}Iniciar sesión - MasterTools{% endblock %}
{% block content %}
<div class="container">
  <div class="form-box">
    <h2 class="section-title">Iniciar sesión</h2>
    <form method="post">
      <div class="form-group"><label>Correo</label><input type="email" name="correo" required></div>
      <div class="form-group"><label>Contraseña</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-amarillo" style="width:100%">Iniciar sesión</button>
    </form>
    <p class="text-center mt-20">¿No tienes cuenta? <a href="{{ url_for('registro') }}" style="color:var(--amarillo)">Regístrate</a></p>
    <p class="text-center" style="color:var(--texto-sec);font-size:12px">Admin demo: admin@mastertools.com / admin123</p>
  </div>
</div>
{% endblock %}
