{% extends "base.html" %}
{% block title %}Contacto - MasterTools{% endblock %}
{% block content %}
<div class="container">
  <h2 class="section-title">Contacto</h2>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:30px;">
    <div>
      <p>📱 <strong>WhatsApp Business:</strong> +54 9 11 1234-5678</p>
      <p>☎️ <strong>Teléfono:</strong> +54 11 4000-0000</p>
      <p>📍 <strong>Dirección:</strong> Av. Siempre Viva 123, Buenos Aires</p>
      <p>🕒 <strong>Horarios:</strong> Lun a Vie de 9 a 18hs / Sáb de 9 a 13hs</p>
      <div style="margin-top:20px;border-radius:10px;overflow:hidden;border:1px solid var(--gris-borde);">
        <iframe src="https://maps.google.com/maps?q=Buenos%20Aires&t=&z=13&ie=UTF8&iwloc=&output=embed"
                width="100%" height="260" style="border:0;filter:grayscale(0.3) invert(0.9) contrast(0.9);"
                loading="lazy"></iframe>
      </div>
    </div>
    <div class="form-box">
      <form method="post">
        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
        <div class="form-group"><label>Correo</label><input type="email" name="correo" required></div>
        <div class="form-group"><label>Mensaje</label><textarea name="mensaje" rows="5" required></textarea></div>
        <button type="submit" class="btn btn-amarillo">Enviar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
