{% extends "base.html" %}
{% block title %}Crear cuenta - MasterTools{% endblock %}
{% block content %}
<div class="container">
  <div class="form-box wide">
    <h2 class="section-title">Crear cuenta</h2>
    <form method="post">
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
        <div class="form-group"><label>Apellido</label><input type="text" name="apellido" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Teléfono</label><input type="text" name="telefono"></div>
        <div class="form-group"><label>Dirección</label><input type="text" name="direccion"></div>
      </div>
      <div class="form-group"><label>Correo</label><input type="email" name="correo" required></div>
      <div class="form-group"><label>Contraseña</label><input type="password" name="password" required minlength="4"></div>
      <button type="submit" class="btn btn-amarillo" style="width:100%">Crear cuenta</button>
    </form>
    <p class="text-center mt-20">¿Ya tienes cuenta? <a href="{{ url_for('login') }}" style="color:var(--amarillo)">Inicia sesión</a></p>
  </div>
</div>
{% endblock %}
